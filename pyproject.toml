[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py", "*_tests.py"]
testpaths = ["tests"]
addopts = "-ra"

[tool.coverage.run]
branch = true
source = ["accounts", "concerts", "cart", "orders", "payments", "config"]
omit = [
    "*/migrations/*",
    "config/asgi.py",
    "config/wsgi.py",
    "manage.py",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
precision = 1
fail_under = 90

[tool.coverage.xml]
output = "coverage.xml"

[tool.ruff]
line-length = 88
target-version = "py312"
extend-exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
