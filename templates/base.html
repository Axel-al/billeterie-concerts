<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Billetterie concerts{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <header class="border-bottom bg-white">
    <nav class="navbar navbar-expand-lg container py-3">
      <a class="navbar-brand fw-semibold" href="{% url 'home' %}">Billetterie concerts</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        {% if user.is_authenticated %}
          <a class="btn btn-outline-primary btn-sm" href="{% url 'accounts:personal_area' %}">Mon espace</a>
          <form method="post" action="{% url 'accounts:logout' %}" class="m-0">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-secondary btn-sm">Déconnexion</button>
          </form>
        {% else %}
          <a class="btn btn-outline-primary btn-sm" href="{% url 'accounts:signup' %}">Inscription</a>
          <a class="btn btn-primary btn-sm" href="{% url 'accounts:login' %}">Connexion</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <main class="container py-5">
    {% if messages %}
      <div class="mb-4">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags|default:'info' }} mb-2" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
