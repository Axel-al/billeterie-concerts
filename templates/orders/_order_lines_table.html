<table class="table align-middle mb-0">
  <thead>
    <tr>
      <th scope="col">Catégorie</th>
      <th scope="col">Prix payé</th>
      <th scope="col">Quantité</th>
      <th scope="col" class="text-end">Total</th>
    </tr>
  </thead>
  <tbody>
    {% for line in order.lines.all %}
      <tr>
        <th scope="row">{{ line.category_name_snapshot }}</th>
        <td>{{ line.unit_price|floatformat:2 }} €</td>
        <td>{{ line.quantity }}</td>
        <td class="text-end">{{ line.line_total|floatformat:2 }} €</td>
      </tr>
    {% endfor %}
  </tbody>
  <tfoot>
    <tr>
      <th scope="row" colspan="3" class="text-end">Total payé</th>
      <td class="text-end fw-semibold">{{ order.total_amount|floatformat:2 }} €</td>
    </tr>
  </tfoot>
</table>
