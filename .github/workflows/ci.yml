name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Django checks
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: django-insecure-ci-test-key-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,[::1],testserver
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Ruff
        run: ruff check .

      - name: Django system checks
        run: python manage.py check

      - name: Tests with coverage
        run: pytest --cov=. --cov-report=xml

      - name: End-to-end tests
        run: |
          if [ -d e2e ]; then
            pytest e2e
          else
            echo "No e2e directory yet; skipping Playwright tests."
          fi

      - name: SonarQube Cloud
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v7.1.0
