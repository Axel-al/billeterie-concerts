name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Django checks
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: django-insecure-ci-test-key-not-for-production
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,[::1],testserver
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements-ci.txt

      - name: Install dependencies
        run: >-
          python -m pip install --only-binary=:all:
          --require-hashes
          -r requirements-ci.txt

      - name: Ruff
        run: ruff check .

      - name: Django system checks
        run: python manage.py check

      - name: Check migration drift
        run: python manage.py makemigrations --check --dry-run

      - name: Tests with coverage
        run: pytest --cov --cov-report=term-missing --cov-report=xml

      - name: Validate coverage paths
        run: python .github/scripts/validate_coverage_xml.py

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: End-to-end tests
        run: pytest e2e --tracing=retain-on-failure --output=test-results/playwright

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore

      - name: SonarQube Cloud
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
